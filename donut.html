<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Donut</title>
    <style>
        body { margin: 0; background: #00050a; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { display: block; cursor: move; }
        .ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="ui">
        <b>Drag Mouse:</b> View aroud you<br>
        <b>Mousewheel:</b> Zoom in and out
    </div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height;
let points = [];
const numPoints = 1000;
let zoom = 400; // Zoom Level (max)

// Camera-Rotation
let rotX = 0, rotY = 0;
let isDragging = false, lastX, lastY;

// 1. Generate Points in a big Void (Hollow Sphere)
function initPoints() {
    points = [];
    for (let i = 0; i < numPoints; i++) {
        // Random spliting in a big Sphere
        const R = 800; // Big-Radius
const r = 300; // Small-Radius (Thickness of the Donut)
const u = Math.random() * Math.PI * 2;
const v = Math.random() * Math.PI * 2;
points.push({
    x: (R + r * Math.cos(v)) * Math.cos(u),
    y: (R + r * Math.cos(v)) * Math.sin(u),
    z: r * Math.sin(v)
});

    }
}

function rotate(p, ax, ay) {
    // Rotation on Y (look right and left)
    let x = p.x * Math.cos(ay) - p.z * Math.sin(ay);
    let z = p.x * Math.sin(ay) + p.z * Math.cos(ay);
    // Rotation on X (look up and down)
    let y = p.y * Math.cos(ax) - z * Math.sin(ax);
    z = p.y * Math.sin(ax) + z * Math.cos(ax);
    return {x, y, z};
}

function draw() {
    ctx.fillStyle = "#00050a";
    ctx.fillRect(0, 0, width, height);
    
    const centerX = width / 2;
    const centerY = height / 2;

    // Drawing Points relativ to the view-area (sry my english is kind a bad)
    points.forEach(p => {
        // calculating the view area
        let transformed = rotate(p, rotX, rotY);

        // Only drawing apoint if its befor the camera
        // adding a offset to not be in the middle of the donut
        let viewZ = transformed.z + 500; 

        if (viewZ > 10) { // Safty Check
            const scale = zoom / viewZ;
            const x2d = transformed.x * scale + centerX;
            const y2d = transformed.y * scale + centerY;

            // Size based on the distanze
            const size = Math.max(0.1, 3 * scale);
            const opacity = Math.min(1, scale * 5);

            ctx.beginPath();
            ctx.arc(x2d, y2d, size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200, 230, 255, ${opacity})`;
            ctx.fill();
        }
    });

    requestAnimationFrame(draw);
}

// Events
window.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
    if (isDragging) {
        rotY += (e.clientX - lastX) * 0.005;
        rotX += (e.clientY - lastY) * 0.005;
        lastX = e.clientX; lastY = e.clientY;
    }
});

// Zoom-Function (Mousewheel)
window.addEventListener('wheel', e => {
    zoom -= e.deltaY * 0.5;
    zoom = Math.max(0.0005, Math.min(2000, zoom)); // Limits
    e.preventDefault();
}, { passive: false });

window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
});

// Start
window.dispatchEvent(new Event('resize'));
initPoints();
draw();
</script>
</body>
